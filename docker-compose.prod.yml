# ═══════════════════════════════════════════════════════════
# SnowShelf v2 - Production Docker Compose
# ═══════════════════════════════════════════════════════════
# Configuration pour déploiement client final.
# Requiert un fichier .env avec toutes les variables.
# Usage: docker compose -f docker-compose.prod.yml up -d
# ═══════════════════════════════════════════════════════════

services:
  # ──────────────────────────────────────────────────────────
  # Base de données MariaDB
  # ──────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:10.11
    container_name: snowshelf_mariadb
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - snowshelf_backend_net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ──────────────────────────────────────────────────────────
  # Cache Redis
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: snowshelf_redis
    restart: unless-stopped
    env_file: .env
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - snowshelf_backend_net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # Tako API - PostgreSQL
  # ──────────────────────────────────────────────────────────
  tako_postgres:
    image: postgres:16-alpine
    container_name: snowshelf_tako_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${TAKO_DB_NAME}
      POSTGRES_USER: ${TAKO_DB_USER}
      POSTGRES_PASSWORD: ${TAKO_DB_PASSWORD}
    volumes:
      - tako_postgres_data:/var/lib/postgresql/data
    networks:
      - snowshelf_tako_net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # FlareSolverr - Anti-bot protection bypass
  # ──────────────────────────────────────────────────────────
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: snowshelf_flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: info
      LOG_HTML: false
      CAPTCHA_SOLVER: none
    networks:
      - snowshelf_tako_net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────────────────
  # Tako API - Service de recherche
  # ──────────────────────────────────────────────────────────
  tako_api:
    image: ghcr.io/nimai26/tako_api:latest
    container_name: snowshelf_tako_api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${TAKO_DB_USER}:${TAKO_DB_PASSWORD}@tako_postgres:5432/${TAKO_DB_NAME}
      FLARESOLVERR_URL: http://flaresolverr:8191
      CACHE_TTL: ${TAKO_CACHE_TTL:-3600}
      AUTO_TRAD_ENABLED: "true"
      DEFAULT_LOCALE: fr-FR
      BRICKSET_API_KEY: ${BRICKSET_API_KEY:-}
      REBRICKABLE_API_KEY: ${REBRICKABLE_API_KEY:-}
      GOOGLE_BOOKS_API_KEY: ${GOOGLE_BOOKS_API_KEY:-}
      COMICVINE_API_KEY: ${COMICVINE_API_KEY:-}
      TVDB_API_KEY: ${TVDB_API_KEY:-}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      DISCOG_API_KEY: ${DISCOG_API_KEY:-}
      RAWG_API_KEY: ${RAWG_API_KEY:-}
      IGDB_CLIENT_ID: ${IGDB_CLIENT_ID:-}
      IGDB_CLIENT_SECRET: ${IGDB_CLIENT_SECRET:-}
      BGG_API_TOKEN: ${BGG_API_TOKEN:-}
      TCG_POKEMON_TOKEN: ${TCG_POKEMON_TOKEN:-}
    depends_on:
      tako_postgres:
        condition: service_healthy
      flaresolverr:
        condition: service_healthy
    networks:
      - snowshelf_tako_net
      - snowshelf_backend_net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ──────────────────────────────────────────────────────────
  # Backend NestJS - API
  # ──────────────────────────────────────────────────────────
  backend:
    image: nimai24/snowshelf2-backend:latest
    container_name: snowshelf_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-15m}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@snowshelf.fr}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      FRONTEND_URL: ${FRONTEND_URL}
      TAKO_API_URL: http://tako_api:3000
      CORS_ORIGIN: ${CORS_ORIGIN}
      API_PREFIX: api/v1
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@snowshelf.fr}
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      tako_api:
        condition: service_healthy
    networks:
      - snowshelf_frontend_net
      - snowshelf_backend_net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ${STORAGE_PATH:-./storage}:/app/storage
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ──────────────────────────────────────────────────────────
  # Frontend React - Application Web
  # ──────────────────────────────────────────────────────────
  frontend:
    image: nimai24/snowshelf2-frontend:latest
    container_name: snowshelf_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - snowshelf_frontend_net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────────────────────
  # NGINX Reverse Proxy (optionnel si client utilise NPM)
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: snowshelf_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - snowshelf_frontend_net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - with-nginx

# ════════════════════════════════════════════════════════════
# Volumes persistants
# ════════════════════════════════════════════════════════════
volumes:
  mariadb_data:
    name: snowshelf_mariadb_data
  redis_data:
    name: snowshelf_redis_data
  tako_postgres_data:
    name: snowshelf_tako_postgres_data

# ════════════════════════════════════════════════════════════
# Réseaux — Isolation frontend / backend / tako
# ════════════════════════════════════════════════════════════
networks:
  snowshelf_frontend_net:
    name: snowshelf_frontend_net
    driver: bridge
  snowshelf_backend_net:
    name: snowshelf_backend_net
    driver: bridge
  snowshelf_tako_net:
    name: snowshelf_tako_net
    driver: bridge
